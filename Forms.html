<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Forms in HTML -->
     <form action="./FormsSubmission.html" target="blank" method="">
        <fieldset>
        <legend>Casual Form</legend>
        
        <label for="">Name:</label>
        <input type="text" placeholder="Enter your Name" name="name" value="" minlength="6" maxlength="12" size="40px" readonly> <br><br>
        
        
        <label for="">Password:</label>
        <input type="password" placeholder="Enter your Password" name="password" required> <br><br>

        <label for="">Email:</label>
        <input type="email" placeholder="Enter your Email" name="email"> <br><br>

        <label for="">Age:</label>
        <input type="number" min="18" max="35" step="2"> <br><br>

        <label for="">Phone:</label>
        <input type="tel" placeholder="Enter your Phone Number"pattern="[0-9]{10}"><br> <br>
        <input type="reset"><br> <br>
        <input type="submit"> <br><br>
        <input type="button" value="Button"> <br><br>
        
        <label for="">Select Color:</label>
        <input type="color"> <br><br>

        <label for=""> Select Languages:</label>
        <input type="checkbox">Tamil
        <input type="checkbox" checked>English
        <input type="checkbox">Telugu
        <input type="checkbox">Punjabi
        <input type="checkbox">Assami
        <input type="checkbox">Gurathi
        <input type="checkbox">Malayalam <br><br>

        <label for="">Range:</label>
        <input type="range"> <br><br>

        <label for="">Gender:</label>
        <input type="radio" name="abc">MALE
        <input type="radio" name="abc" disabled>FEMALE <br><br>

        <label for="">Browse:</label>
        <input type="url"> <br><br>

        <label for="">Search:</label>
        <input type="search"> <br><br>

        <label for="">Date:</label>
        <input type="date"> <br><br>

        <label for="">Month:</label>
        <input type="month"> <br><br>

        <label for="">Week:</label>
        <input type="week"> <br><br>

        <label for="">Time:</label>
        <input type="time"> <br><br>

        <label for="">Local date-time:</label>
        <input type="datetime-local"> <br><br>

        <label for="">Select File:</label>
        <input type="file"> <br><br>



        <label for="">Address:</label>
        <!-- Rows and Col -->
        <textarea name="" id="" rows="10" column="10">Lorem ipsum dolor sit amet consectetur adipisicing elit. Veniam deleniti velit repudiandae earum dolore delectus!</textarea> <br><br>

        <label for="">Country:</label>
        <select name="" id="">
            <!-- hidden is used to hide the first option in the box -->
            <option value="" hidden >Enter your Country</option>
            <option value="">India</option>
            <option value="">China</option>
            <option value="">Japan</option>
            <option value="">Korea</option>
            <option value="">USA</option>
            <option value="">UAE</option>
        </select>

       </fieldset>
        
     </form>
</body>
</html>
